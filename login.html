<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="./index-FsI4UGjo.css">
  <script src="header.js" defer></script>
  <script src="sms.js" defer></script>
  <title>Sign In / Sign Up • Deep Edge</title>
  <style>
    :root {
      --purple: #7B2D8E;
      --purple-dark: #662375;
      --green: #10b981;
      --green-dark: #059669;
      --text: #1B1B2F;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #F3EEF9 0%, #F7F2FC 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 1px solid rgba(229, 231, 235, 0.6);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 24px 70px rgba(27, 27, 47, 0.12);
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--purple);
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .login-form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(229, 231, 235, 0.6);
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.25s;
    }

    input:focus {
      outline: none;
      border-color: var(--purple);
      background: white;
      box-shadow: 0 0 0 5px rgba(123, 45, 142, 0.08);
    }

    input:disabled {
      background: #f3f4f6;
      color: var(--muted);
      cursor: not-allowed;
    }

    .password-requirements {
      margin-top: 12px;
      padding: 14px 16px;
      background: rgba(247, 242, 252, 0.5);
      border: 1px solid rgba(229, 231, 235, 0.4);
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      color: var(--muted);
      transition: color 0.2s;
    }

    .requirement.met {
      color: var(--green);
    }

    .requirement-icon {
      font-size: 0.8rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin: 32px 0 24px;
    }

    button {
      flex: 1;
      padding: 14px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
      min-height: 44px;
    }

    #btnSignUp {
      background: var(--purple);
      color: white;
      box-shadow: 0 4px 15px rgba(123, 45, 142, 0.25);
    }

    #btnSignUp:hover:not(:disabled) {
      background: var(--purple-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(123, 45, 142, 0.35);
    }

    #btnSignIn {
      background: white;
      color: var(--purple);
      border: 2px solid var(--purple);
    }

    #btnSignIn:hover:not(:disabled) {
      background: rgba(247, 242, 252, 0.9);
      transform: translateY(-2px);
    }

    #btnSignOut {
      background: #dc2626;
      color: white;
      width: 100%;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.25);
    }

    #btnSignOut:hover:not(:disabled) {
      background: #b91c1c;
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      min-height: 1.4em;
      padding: 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: 16px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .info {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .hidden {
      display: none !important;
    }

    .form-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 20px;
    }

    .form-footer a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px 20px;
      }
      h1 { font-size: 1.75rem; }
      .buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Deep Edge</h1>
    <p class="subtitle">Professional lawn care management</p>

    <div class="login-form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required />
    </div>

    <div class="login-form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      <div class="password-requirements" id="passwordReqs" style="display: none;">
        <div class="requirement" id="reqLength">
          <span class="requirement-icon">○</span>
          <span>At least 6 characters</span>
        </div>
        <div class="requirement" id="reqLower">
          <span class="requirement-icon">○</span>
          <span>One lowercase letter</span>
        </div>
        <div class="requirement" id="reqUpper">
          <span class="requirement-icon">○</span>
          <span>One uppercase letter</span>
        </div>
        <div class="requirement" id="reqNumber">
          <span class="requirement-icon">○</span>
          <span>One number</span>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="btnSignUp">Create Account</button>
      <button id="btnSignIn">Sign In</button>
      <button id="btnSignOut" class="hidden">Sign Out</button>
    </div>

    <div id="message" class="info">Enter your email and password to continue</div>

    <div class="form-footer">
      <p style="margin-bottom: 8px;">Need help? Contact support@deepedge.co.nz</p>
    </div>
  </div>
  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyAzS6a2JbgFxSJLPi2-sWyflOfrE7jd73g",
      authDomain: "deep-edge-cc5bd.firebaseapp.com",
      projectId: "deep-edge-cc5bd",
      storageBucket: "deep-edge-cc5bd.firebasestorage.app",
      messagingSenderId: "23198790796",
      appId: "1:23198790796:web:616de764b8a8db2ae1f7a9",
      measurementId: "G-GLYGPCHRXM"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      sendEmailVerification,
      reload
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const msgEl = document.getElementById('message');
    const btnSignUp = document.getElementById('btnSignUp');
    const btnSignIn = document.getElementById('btnSignIn');
    const btnSignOut = document.getElementById('btnSignOut');
    const passwordReqs = document.getElementById('passwordReqs');

    const WORKER_URL = "https://firebase-protected-backend.jamesisarad.workers.dev";

    const validatePassword = (password) => {
      return {
        length: password.length >= 6,
        lower: /[a-z]/.test(password),
        upper: /[A-Z]/.test(password),
        number: /[0-9]/.test(password)
      };
    };

    const isPasswordValid = (password) => {
      const rules = validatePassword(password);
      return rules.length && rules.lower && rules.upper && rules.number;
    };

    passwordEl.addEventListener('input', () => {
      const password = passwordEl.value;
      if (password.length > 0) {
        passwordReqs.style.display = 'block';
      } else {
        passwordReqs.style.display = 'none';
      }
      const rules = validatePassword(password);
      updateRequirement('reqLength', rules.length);
      updateRequirement('reqLower', rules.lower);
      updateRequirement('reqUpper', rules.upper);
      updateRequirement('reqNumber', rules.number);
    });

    const updateRequirement = (id, met) => {
      const el = document.getElementById(id);
      if (met) {
        el.classList.add('met');
        el.querySelector('.requirement-icon').textContent = '\u2713';
      } else {
        el.classList.remove('met');
        el.querySelector('.requirement-icon').textContent = '\u25CB';
      }
    };

    function showMessage(text, type = 'info') {
      msgEl.innerHTML = text;
      msgEl.className = type;
    }

    const parseFirebaseError = (error) => {
      const code = error.code;
      const message = error.message;
      const errorMap = {
        'auth/email-already-in-use': 'This email is already registered. Please sign in instead.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/weak-password': 'Password must be at least 6 characters.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/too-many-requests': 'Too many login attempts. Please try again later.',
        'auth/operation-not-allowed': 'Sign up is currently disabled.',
        'auth/network-request-failed': 'Network error. Please check your connection.',
      };
      return errorMap[code] || message || 'An error occurred. Please try again.';
    };

    const defaultProfile = {
      companyName: "My Lawn Business",
      nzbn: "",
      address: "",
      phone: "",
      email: "",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };

    async function createUserProfile(user) {
      const token = await user.getIdToken();
      const profile = {
        ...defaultProfile,
        email: user.email || "",
        uid: user.uid
      };
      try {
        const res = await fetch(`${WORKER_URL}/api/user/profile`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(profile)
        });
        if (res.ok) {
          console.log("User profile created in USERS_KV:", profile);
        } else {
          const err = await res.json();
          console.warn(`Profile save failed: ${err.error || 'Unknown'}`);
        }
      } catch (e) {
        console.error("Profile save error:", e);
      }
    }

    btnSignUp.addEventListener('click', async () => {
      const email = emailEl.value.trim();
      const pass = passwordEl.value;
      if (!email) { showMessage("Please enter your email address.", "error"); return; }
      if (!pass) { showMessage("Please enter a password.", "error"); return; }
      if (!isPasswordValid(pass)) {
        showMessage("Password must contain at least 6 characters, including uppercase, lowercase, and a number.", "error");
        return;
      }
      btnSignUp.disabled = true;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const user = cred.user;
        await sendEmailVerification(user);
        showMessage("\u2713 Account created! Please check your email to verify your address (check spam folder).", "success");
        await createUserProfile(user);
        emailEl.value = '';
        passwordEl.value = '';
        passwordReqs.style.display = 'none';
      } catch (error) {
        const friendlyError = parseFirebaseError(error);
        showMessage(friendlyError, "error");
      } finally {
        btnSignUp.disabled = false;
      }
    });

    btnSignIn.addEventListener('click', async () => {
      const email = emailEl.value.trim();
      const pass = passwordEl.value;
      if (!email) { showMessage("Please enter your email address.", "error"); return; }
      if (!pass) { showMessage("Please enter your password.", "error"); return; }
      btnSignIn.disabled = true;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (error) {
        const friendlyError = parseFirebaseError(error);
        showMessage(friendlyError, "error");
        btnSignIn.disabled = false;
      }
    });

    btnSignOut.addEventListener('click', async () => {
      btnSignOut.disabled = true;
      try {
        await signOut(auth);
        showMessage("Signed out successfully.", "info");
      } catch (error) {
        showMessage("Sign out failed: " + parseFirebaseError(error), "error");
      } finally {
        btnSignOut.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await reload(user);
        const verified = user.emailVerified;
        btnSignOut.classList.remove('hidden');
        btnSignIn.classList.add('hidden');
        btnSignUp.classList.add('hidden');
        emailEl.disabled = true;
        passwordEl.disabled = true;
        if (verified) {
          showMessage("\u2713 Email verified! Redirecting...", "success");
          localStorage.setItem('isLoggedIn', 'true');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } else {
          showMessage("\u23F3 Please verify your email first. Check your inbox (and spam folder).", "info");
        }
      } else {
        showMessage("Enter your email and password to continue", "info");
        btnSignOut.classList.add('hidden');
        btnSignIn.classList.remove('hidden');
        btnSignUp.classList.remove('hidden');
        emailEl.disabled = false;
        passwordEl.disabled = false;
        btnSignIn.disabled = false;
        btnSignUp.disabled = false;
      }
    });
  </script>
</body>
</html>
